<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            font-family:  sans-serif;
        }
        .divBox{
            position: fixed;
            left: 50%;
            height: 50%;
            transform: translate(-50%,-50%);
            transition: 0.3s;
            width: 350px;
            top: -1000px;
            box-shadow: 0px 0px 10px 2px royalblue;
        }
        .divBox h2{
            text-align: center;
            border-bottom: 1px solid #ccc;
            padding: 10px 0px;
            position: relative;
            
        }
        .divBox span{
            position: absolute;
            right: 10px;
            cursor: pointer;  
            
        }
    </style>
</head>
<body>
    <button>Click</button>
    <div class="divBox">
        <h2>Enquiry Box <span>&times;</span></h2>
        <form></form>


    </div>
    <script>
        let boxElement=document.querySelector(".divBox")
        let btnElement=document.querySelector("button")
        let closebtn=document.querySelector(".divBox span")

        btnElement.addEventListener("click",()=>{
            boxElement.style.top="50%"
           // boxElement.style.top="-1000px"
        })
        closebtn.addEventListener("click",()=>{
            boxElement.style.top="-1000px"
        })

    </script>
</body>
</html>
